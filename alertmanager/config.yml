global:
  resolve_timeout: 5m

templates:
  - "/etc/alertmanager/templates/*.tmpl"

route:
  receiver: "default"
  group_by: ["alertname", "cluster", "service"]
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="critical"
      receiver: "critical"
      group_wait: 5s
      group_interval: 5s
      repeat_interval: 30m

    - matchers:
        - alertgroup="sla"
      receiver: "sla-alerts"
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h

    - matchers:
        - alertgroup="performance"
      receiver: "performance-alerts"
      group_wait: 1m
      group_interval: 10m
      repeat_interval: 4h

receivers:
  - name: "default"
  - name: "critical"
  - name: "sla-alerts"
  - name: "performance-alerts"

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname", "service"]

  - source_matchers:
      - severity="warning"
    target_matchers:
      - severity="info"
    equal: ["alertname", "service"]
