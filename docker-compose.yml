version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: sla-guardian-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: ./api
    container_name: sla-guardian-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  worker:
    build: ./worker
    container_name: sla-guardian-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always
