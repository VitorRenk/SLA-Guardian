services:
  redis:
    image: redis:7-alpine
    container_name: sla-guardian-redis
    ports:
      - "6379:6379"
    restart: always

  api:
    build: ./api
    container_name: sla-guardian-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  worker:
    build: ./worker
    container_name: sla-guardian-worker
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    restart: always

  # PROMETHEUS - Coleta metricas
  prometheus:
    image: prom/prometheus:latest
    container_name: sla-guardian-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-rules.yml:/etc/prometheus/prometheus-rules.yml
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - api
    restart: always

  # GRAFANA - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: sla-guardian-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana-provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana-provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana-provisioning/alertmanagers:/etc/grafana/provisioning/alertmanagers
    depends_on:
      - prometheus
    restart: always

  # ALERTMANAGER - Gerencia notificacoes de alertas
  alertmanager:
    image: prom/alertmanager:latest
    container_name: sla-guardian-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager/config.yml:/etc/alertmanager/config.yml
      - ./alertmanager/templates.tmpl:/etc/alertmanager/templates/templates.tmpl
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/config.yml"
      - "--storage.path=/alertmanager"
      - "--config.expand-env"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
    restart: always

volumes:
  prometheus-data:
  grafana-data:
  alertmanager-data:
